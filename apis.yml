apis:
  - aid: allianz-trade-online:payment-overdues-api
    name: Allianz Trade Payment Overdues API
    tags:
      - Trade Credit
      - Payment
      - Overdues
      - Risk Management
    properties:
      - url: https://developers.allianz-trade.com/welcome-trade-credit-insurance-api-world/payment-overdues
        type: Documentation
      - url: https://developers.allianz-trade.com/
        type: Portal
      - url: openapi/allianz-trade-payment-overdues.yaml
        type: OpenAPI
      - url: json-schema/trade-payment-overdues-overdue-schema.json
        type: JSONSchema
      - url: json-structure/trade-payment-overdues-overdue-structure.json
        type: JSONStructure
      - url: json-ld/allianz-trade-payment-overdues-context.jsonld
        type: JSONLD
      - url: examples/trade-payment-overdues-overdue-example.json
        type: Example
      - url: examples/trade-payment-overdues-job_response-example.json
        type: Example
      - url: capabilities/shared/payment-overdues.yaml
        type: NaftikoCapability
    description: >-
      Report payment overdues, request extension periods, and manage debt
      rescheduling for trade credit insurance policies. Supports three overdue
      category types: OVD (report default), EXP (extension period), and RES
      (rescheduling/repayment plan).
    humanURL: https://developers.allianz-trade.com/welcome-trade-credit-insurance-api-world/payment-overdues
    baseURL: https://api.allianz-trade.com/v1

