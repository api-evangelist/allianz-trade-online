aid: allianz-trade-online
url: >-
  https://raw.githubusercontent.com/api-evangelist/allianz-trade-online/refs/heads/main/apis.yml
name: Allianz Trade
tags:
  - Credit Insurance
  - Insurance
  - Risk Management
  - Trade Credit
  - E-Commerce
  - Surety
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  Allianz Trade APIs enable businesses to automate trade credit insurance
  management including cover requests, credit limit monitoring, payment overdue
  reporting, claims management, and company credit grading. Built on secure
  REST architecture with OAuth2, the APIs support three business lines: Trade
  Credit Insurance, E-Commerce B2B, and Surety/Guarantee.
created: '2024-01-01'
modified: '2026-04-19'
