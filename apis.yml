    type: ChangeLog
  - url: mailto:api@allianz-trade.com
    type: Support
  - url: rules/allianz-trade-online-spectral-rules.yml
    type: SpectralRules
  - url: vocabulary/allianz-trade-online-vocabulary.yaml
    type: Vocabulary
  - url: capabilities/trade-credit-management.yaml
    type: NaftikoCapability
  - type: Features
    data:
      - name: Credit Limit Management
        description: >-
          Automate credit limit and cover information importing from Allianz Trade
          into ERP systems for real-time credit risk management.
      - name: Company Credit Grading
        description: >-
          Retrieve creditworthiness grades for clients and prospects with bulk
          operations supporting large portfolio risk assessments.
      - name: Payment Overdue Reporting
        description: >-
          Report payment defaults, request extension periods, and manage debt
          rescheduling through standardized overdue category codes.
      - name: Claims Management
        description: >-
          Integrate claims declaration and tracking directly into ERP systems
          for streamlined insurance claim management.
      - name: Policy Portfolio Management
        description: >-
          Manage trade credit insurance policy portfolios including joint insured
          policies and policy configuration from enterprise systems.
      - name: E-Commerce B2B Credit
        description: >-
          Real-time credit evaluation on a per-transaction basis for B2B
          e-commerce platforms enabling buy-now-pay-later type scenarios.
      - name: OAuth2 Security
        description: >-
          Secure OAuth2 authentication for all API endpoints with client
          credentials flow for machine-to-machine ERP integrations.
      - name: Webhook Notifications
        description: >-
          Webhook-based notifications for technical events (job completion)
          and functional events (business decisions) with HTTPS and IP whitelisting.
  - type: UseCases
    data:
      - name: ERP Credit Management Integration
        description: >-
          Integrate Allianz Trade APIs into SAP, Oracle, or other ERP systems
          to automate credit risk management and policy administration.
      - name: Automated Credit Risk Dashboard
        description: >-
          Build custom credit management dashboards pulling live credit grades,
          cover status, and claim data from Allianz Trade APIs.
      - name: B2B E-Commerce Credit Evaluation
        description: >-
          Enable real-time per-transaction credit underwriting for B2B online
          marketplaces and trade platforms using the E-Commerce APIs.
      - name: Payment Monitoring and Overdue Automation
        description: >-
          Automate payment overdue reporting to Allianz Trade when customers
          miss payment deadlines, triggering insurance coverage workflows.
  - type: Integrations
    data:
      - name: SAP
        description: >-
          ERP integration with SAP for automated trade credit management,
          policy data synchronization, and claims processing.
      - name: Oracle
        description: >-
          Oracle ERP integration for credit limit monitoring and automated
          policy data synchronization.
      - name: Postman
        description: >-
          OpenAPI collections downloadable from the developer portal for
          Postman, Insomnia, and HTTPie testing.
      - name: Salesforce
        description: >-
          CRM integration for combining Allianz Trade risk data with customer
          relationship management workflows.
