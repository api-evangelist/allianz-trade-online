name: Company Grade
description: Shared capability definition for Allianz Trade company creditworthiness grading operations
version: 1.0.0
base_url: https://api.allianz-trade.com/v1
auth:
  type: oauth2
  flow: client_credentials
  token_url: https://api.allianz-trade.com/oauth2/token
  scopes:
    - grades:read
    - grades:write
operations:
  - id: listCompanyGrades
    method: GET
    path: /company-grades
    summary: List company grades with pagination
  - id: requestCompanyGrade
    method: POST
    path: /company-grades
    summary: Request a company creditworthiness grade (returns 202 + jobId)
    async: true
  - id: getCompanyGrade
    method: GET
    path: /company-grades/{gradeId}
    summary: Get a specific company grade
  - id: getJobStatus
    method: GET
    path: /jobs/{jobId}
    summary: Poll async job status
rest_port: 8102
mcp_port: 9102
