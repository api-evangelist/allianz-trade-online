name: Claims
description: Shared capability definition for Allianz Trade insurance claims management operations
version: 1.0.0
base_url: https://api.allianz-trade.com/v1
auth:
  type: oauth2
  flow: client_credentials
  token_url: https://api.allianz-trade.com/oauth2/token
  scopes:
    - claims:read
    - claims:write
operations:
  - id: listClaims
    method: GET
    path: /claims
    summary: List insurance claims with pagination
  - id: submitClaim
    method: POST
    path: /claims
    summary: Submit a new insurance claim (returns 202 + jobId)
    async: true
  - id: getClaim
    method: GET
    path: /claims/{claimId}
    summary: Get a specific insurance claim
  - id: getJobStatus
    method: GET
    path: /jobs/{jobId}
    summary: Poll async job status
rest_port: 8103
mcp_port: 9103
